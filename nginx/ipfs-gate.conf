# ipfs-gate v0.1 — nginx config.
#
# REPLACE every instance of "ipfs.example.com" with your actual domain
# BEFORE running docker compose up.
#
# Two-stage deploy:
#   1. Comment out the HTTPS block; bring up nginx with HTTP only.
#   2. Get the cert via certbot (see WalkThrough.wiki).
#   3. Uncomment the HTTPS block; restart nginx.

# ─── Landing page vs API on "/" ─────────────────────────────────────────────
# The gate's JSON info endpoint AND the standalone landing page both live at
# "/". Browsers navigating send "Accept: text/html" → they get the page;
# fetch()/curl/API clients send "Accept: */*" (or application/json) → they get
# the gate's JSON. This keeps v4call clients (which fetch "/" for pricing caps)
# working while humans see the landing page.
map $http_accept $prefer_html {
    default 0;
    ~*text/html 1;
}

# ─── HTTP — used for ACME challenge + redirect ──────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ipfs.example.com;

    # Let's Encrypt webroot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS. Ships enabled: before the cert exists
    # (walkthrough Step 5) this points at a dead HTTPS URL, which is harmless —
    # the ACME path above stays reachable, so certbot still works.
    location / {
        return 301 https://$host$request_uri;
    }
}

