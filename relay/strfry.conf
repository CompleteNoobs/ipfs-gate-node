# Minimal strfry config for the LOCAL escrow-protocol test relay
# (docker compose --profile relay). Not a public relay: no TLS, no auth —
# the escrow trust gate is the INNER escrow-protocol schnorr signature,
# the relay is only delivery. Unset fields use strfry's defaults.

db = "/app/strfry-db/"

relay {
    bind = "0.0.0.0"
    port = 7777
    nofiles = 65536

    info {
        name = "ipfs-gate local escrow relay"
        description = "offline test relay for escrow-protocol/0.1 (kind-31337)"
    }
}
